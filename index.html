<!DOCTYPE html>
<html>
<head>
  <title>checking</title>

  <style>
    body {
      margin: 0;
      background: #050505;
      color: #aaa;
      font-family: monospace;
      overflow: hidden;
    }

    #text {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 13px;
      opacity: 0.7;
    }

    #dot {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* red code stream */
    #code {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      color: rgba(255, 0, 0, 0.15);
      font-size: 12px;
      white-space: pre;
      pointer-events: none;
      overflow: hidden;
    }
  </style>
</head>

<body>

<div id="text">checking<span id="dot">_</span></div>
<div id="code"></div>

<script>
let count = 0
let codeBox = document.getElementById("code")

let messages = [
  "access required",
  "verifying",
  "still verifying",
  "processing",
  "checking again",
  "almost done",
  "retry",
  "wait"
]

// generate random code lines
function randomCode() {
  let chars = "01abcdef<>/{}"
  let line = ""

  for(let i = 0; i < 80; i++) {
    line += chars[Math.floor(Math.random() * chars.length)]
  }

  return line
}

// keep adding code
setInterval(() => {
  codeBox.innerText += randomCode() + "\n"

  // limit lines
  let lines = codeBox.innerText.split("\n")
  if(lines.length > 40) {
    lines.shift()
    codeBox.innerText = lines.join("\n")
  }
}, 120)

function ask() {
  if(count < 7) {
    let msg = messages[Math.floor(Math.random() * messages.length)]

    confirm(msg)

    count++

    setTimeout(ask, 400)
  } else {
    document.body.innerHTML = "<div id='text'>done<br>you took long</div>"
  }
}

ask()
</script>

</body>
</html>
